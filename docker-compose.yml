services:
    web:
        image: ghcr.io/jaikeex/cookhound:latest
        restart: always
        ports:
            - '3000:3000'
        env_file: .env
        environment:
            - NODE_ENV=production
        volumes:
            - /var/log/cookhound:/var/log/cookhound
        depends_on:
            - redis
            - typesense

    worker:
        image: ghcr.io/jaikeex/cookhound:latest
        command: ['tsx', 'src/server/queues/worker.ts']
        restart: always
        env_file: .env
        environment:
            - NODE_ENV=production
        volumes:
            - /var/log/cookhound:/var/log/cookhound
        depends_on:
            - redis
            - typesense

    redis:
        image: redis:7-alpine
        restart: always
        volumes:
            - redis-data:/data
        command: redis-server --requirepass ${REDIS_PASSWORD}

    typesense:
        image: typesense/typesense:0.25.2
        command: '--data-dir /data --api-key=${TYPESENSE_API_KEY} --listen-port 8108'
        environment:
            - TYPESENSE_DATA_DIR=/data
        restart: always
        volumes:
            - typesense-data:/data
        ports:
            - '8108:8108'
volumes:
    redis-data:
    typesense-data:
